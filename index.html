<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>GG Demo</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="appShell">
    <div id="stageFrame" aria-label="Игровая область 9 на 16">
      <div id="stage">
        <div id="bg"></div>

        <div id="dragon" class="entity">
          <div class="hplabel" id="dragonLabel">Dragon 100/100</div>
          <div class="hpbar"><div class="hpfill" id="dragonHP"></div></div>
          <div class="sprite" id="dragonSprite"></div>
        </div>

        <div id="player" class="entity">
          <div class="hplabel" id="playerLabel">HP 1000/1000</div>
          <div class="hpbar"><div class="hpfill" id="playerHP"></div></div>
          <div class="sprite" id="playerSprite"></div>
        </div>

        <div id="hint">Тап или клик — идти в точку. Подойди к дракону — атака.</div>
      </div>
    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
